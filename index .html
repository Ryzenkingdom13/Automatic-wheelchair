<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Robot Control</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }
        .control-btn {
            width: 120px;
            height: 60px;
            font-size: 18px;
        }
        .emergency-btn {
            width: 220px;
            height: 70px;
            font-size: 20px;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <!-- TITLE -->
    <div class="text-center mb-4">
        <h2 class="fw-bold">🤖 Robot Control Dashboard</h2>
    </div>

    <div class="row">

        <!-- CONTROL PANEL -->
        <div class="col-md-6 mb-4">
            <div class="card shadow p-4 text-center">

                <h4 class="mb-3">🎮 Controls</h4>

                <!-- FORWARD -->
                <div class="mb-2">
                    <button class="btn btn-success control-btn"
                        onclick="send('FORWARD')">⬆ Forward</button>
                </div>

                <!-- LEFT RIGHT -->
                <div class="d-flex justify-content-center gap-3 mb-2">
                    <button class="btn btn-primary control-btn"
                        onclick="send('LEFT')">⬅ Left</button>

                    <button class="btn btn-primary control-btn"
                        onclick="send('RIGHT')">Right ➡</button>
                </div>

                <!-- REVERSE -->
                <div class="mb-2">
                    <button class="btn btn-warning control-btn"
                        onclick="send('REVERSE')">⬇ Reverse</button>
                </div>

                <!-- STOP -->
                <div class="mb-3">
                    <button class="btn btn-dark control-btn"
                        onclick="send('STOP')">⏹ Stop</button>
                </div>

                <!-- EMERGENCY BUTTON -->
                <button id="emBtn"
                    class="btn btn-danger emergency-btn"
                    onclick="toggleEmergency()">
                    🚨 EMERGENCY STOP
                </button>

                <!-- STATUS -->
                <h5 class="mt-3">
                    Status:
                    <span id="status" class="text-success">NORMAL</span>
                </h5>

            </div>
        </div>

        <!-- GPS DISPLAY -->
        <div class="col-md-6">
            <div class="card shadow p-4 text-center">

                <h4 class="mb-3">📍 Live Location</h4>

                <h5 id="gps" class="text-primary">Loading...</h5>

                <a id="mapLink" target="_blank"
                   class="btn btn-outline-primary mt-3">
                   Open in Google Maps
                </a>

            </div>
        </div>

    </div>

</div>

<!-- JS -->
<script>

let emergencyState = 0;

// ================= SEND COMMAND =================
function send(cmd) {

    if (emergencyState == 1) {
        alert("🚨 Emergency Active! Reset first.");
        return;
    }

    fetch("update_command.php?cmd=" + cmd);
}

// ================= TOGGLE EMERGENCY =================
function toggleEmergency() {

    if (emergencyState == 0) {

        fetch("emergency.php");
        emergencyState = 1;

        document.getElementById("status").innerHTML = "EMERGENCY";
        document.getElementById("status").className = "text-danger";

        document.getElementById("emBtn").innerHTML = "✅ RESET EMERGENCY";
        document.getElementById("emBtn").className = "btn btn-success emergency-btn";

    } else {

        fetch("reset_emergency.php");
        emergencyState = 0;

        document.getElementById("status").innerHTML = "NORMAL";
        document.getElementById("status").className = "text-success";

        document.getElementById("emBtn").innerHTML = "🚨 EMERGENCY STOP";
        document.getElementById("emBtn").className = "btn btn-danger emergency-btn";
    }
}

// ================= GET GPS =================
function getGPS() {
    fetch("get_gps.php")
    .then(res => res.text())
    .then(data => {

        document.getElementById("gps").innerHTML = data;

        let parts = data.split(",");
        let lat = parts[0];
        let lon = parts[1];

        let mapURL = "https://www.google.com/maps?q=" + lat + "," + lon;
        document.getElementById("mapLink").href = mapURL;
    });
}

// ================= AUTO UPDATE =================
setInterval(getGPS, 2000);

</script>

</body>
</html>
